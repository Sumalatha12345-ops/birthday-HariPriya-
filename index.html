<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Hari</title>

<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Montserrat',sans-serif;
background:url('https://images.unsplash.com/photo-1603532648955-039310d9ed75?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;
overflow:hidden;
}

.container{
display:flex;
align-items:center;
gap:40px;
z-index:2;
}

.photo{
width:180px;
height:300px;
border:5px solid white;
border-radius:10px;
object-fit:cover;
}

h1{
font-family:'Sacramento',cursive;
font-size:50px;
color:white;
}

.name{
color:#ffe066;
font-size:25px;
}

/* 💚 UPDATED WISH TEXT COLOR */
#msg{
margin-top:10px;
min-height:120px;
white-space:pre-line;
line-height:1.6;
font-weight:bold;
font-size:18px;
color:green;
}

button{
padding:10px 20px;
margin-top:10px;
background:#ff4d6d;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

/* 🎈 balloons */
.balloon{
position:absolute;
bottom:-150px;
width:50px;
height:70px;
border-radius:50% 50% 45% 45%;
animation:float 8s linear infinite;
}

.balloon::before{
content:"";
position:absolute;
width:2px;
height:50px;
background:#fff;
top:100%;
left:50%;
transform:translateX(-50%);
}

.balloon::after{
content:"🎀";
position:absolute;
left:50%;
top:100%;
transform:translate(-50%,5px);
font-size:18px;
animation:bowMove 1s infinite alternate;
}

@keyframes bowMove{
from{transform:translate(-50%,5px) rotate(-5deg);}
to{transform:translate(-50%,5px) rotate(5deg);}
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-130vh);}
}

/* 🎁 gift */
.gift{
position:fixed;
bottom:100px;
cursor:pointer;
animation:floatGift 3s infinite ease-in-out;
}

.gift1{left:20px;}
.gift2{right:20px;}

@keyframes floatGift{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

/* 🎁 BIG BOX */
.box{
width:100px;
height:100px;
position:relative;
animation:shake 2s infinite;
}

.base{
width:100px;
height:70px;
background:#7b6aff;
position:absolute;
bottom:0;
border-radius:10px;
box-shadow:0 0 15px rgba(123,106,255,0.8);
}

.lid{
width:100px;
height:30px;
background:#4d2eff;
position:absolute;
top:0;
transition:.5s;
transform-origin:left bottom;
border-radius:10px;
box-shadow:0 0 15px rgba(77,46,255,0.8);
}

.base::before{
content:"";
position:absolute;
width:10px;
height:100%;
background:#ff4d6d;
left:50%;
transform:translateX(-50%);
}

.lid::after{
content:"";
position:absolute;
width:100%;
height:10px;
background:#ff4d6d;
top:50%;
transform:translateY(-50%);
}

.box:hover{
box-shadow:0 0 25px #ff4d6d,0 0 50px #ffd700;
}

@keyframes shake{
0%{transform:rotate(0);}
25%{transform:rotate(2deg);}
50%{transform:rotate(0);}
75%{transform:rotate(-2deg);}
100%{transform:rotate(0);}
}

.gift.open .lid{
transform:rotate(-120deg);
animation:none;
}

/* 💖 hearts */
.heart{
position:fixed;
animation:rise 4s linear forwards;
}

@keyframes rise{
0%{transform:translateY(0) scale(1);opacity:1;}
100%{transform:translateY(-1000px) scale(1.8);opacity:0;}
}
</style>
</head>

<body>

<div class="container">
<img src="https://i.ibb.co/JRpq019H/pic.png" class="photo">

<div>
<h1>Happy Birthday 🎂</h1>
<div class="name">Dear HariPriya 💖</div>

<button onclick="startExperience()">Click Surprise 🎁</button>

<p id="msg"></p>
</div>
</div>

<!-- 🎁 gifts -->
<div class="gift gift1" onclick="openGift(this)">
<div class="box"><div class="lid"></div><div class="base"></div></div>
</div>

<div class="gift gift2" onclick="openGift(this)">
<div class="box"><div class="lid"></div><div class="base"></div></div>
</div>

<script>

// typing
function startExperience(){
typeWish();
}

let t;
function typeWish(){
let text=`Happy Birthday to my lovely sister 💕  

You are my best friend forever 💖  
You always support me and care for me 🤗  

Wishing you lots of happiness, love, and success 🎉  
May all your dreams come true ✨  

Stay happy always 😊❤️  
Love you akka 💐💖`;

let msg=document.getElementById("msg");
msg.innerHTML="";
clearInterval(t);

let i=0;
t=setInterval(()=>{
msg.innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(t);
},40);
}

// 🎈 balloons
let colors=["#ff4d6d","#a0c4ff","#caffbf","#ffc6ff","#ffd6a5","#bdb2ff"];

for(let i=0;i<30;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.background=colors[Math.floor(Math.random()*colors.length)];
b.style.animationDuration=(5 + Math.random()*5) + "s";
document.body.appendChild(b);
}

// 💥 hearts
function openGift(el){
el.classList.add("open");
let r=el.getBoundingClientRect();

let hearts=["❤","💖","💘","💝","💕","💞","💗"];

for(let i=0;i<100;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=hearts[Math.floor(Math.random()*hearts.length)];

h.style.left=(r.left + Math.random()*200 - 80)+"px";
h.style.top=(r.top + Math.random()*20)+"px";

h.style.fontSize=(18 + Math.random()*30)+"px";
h.style.animationDuration=(2 + Math.random()*3)+"s";

document.body.appendChild(h);

setTimeout(()=>h.remove(),5000);
}

setTimeout(()=>el.classList.remove("open"),800);
}
</script>

</body>
</html>
