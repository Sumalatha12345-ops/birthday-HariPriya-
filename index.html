<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Hari</title>

<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Montserrat', sans-serif;

    /* 🎂 NEW CAKE BACKGROUND */
    background: url('https://images.unsplash.com/photo-1603532648955-039310d9ed75?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover;
    overflow: hidden;
}

/* Overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

/* Layout */
.container {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 60px;
}

/* IMAGE */
.photo {
    width: 200px;
    height: 360px;
    border-radius: 14px;
    border: 5px solid white;
    object-fit: cover;
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

/* Content */
.content { text-align: left; }

h1 {
    font-family: 'Sacramento', cursive;
    font-size: 60px;
    color: white;
}

.name {
    font-size: 28px;
    color: #ffe066;
}

/* Message */
#msg {
    color: #fff3b0;
    font-size: 18px;
    margin-top: 15px;
}

/* Button */
button {
    padding: 10px 20px;
    margin-top: 15px;
    background: linear-gradient(45deg,#ff2e63,#ff6a88);
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

/* 🎈 Balloons */
.balloon {
    position: absolute;
    bottom: -120px;
    width: 50px;
    height: 70px;
    border-radius: 50%;
    animation: floatUp linear infinite;
}
.balloon::before {
    content: "";
    position: absolute;
    width: 2px;
    height: 50px;
    background: currentColor;
    bottom: -50px;
    left: 50%;
}
@keyframes floatUp {
    100% { transform: translateY(-120vh); }
}

/* 🎊 Confetti */
.confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    animation: fall linear infinite;
}
@keyframes fall {
    100% { transform: translateY(100vh); }
}

/* ❤️ Hearts */
.heart {
    position: fixed;
    color: #4dff7c;
    animation: rise 4s linear forwards;
}
@keyframes rise {
    100% { transform: translateY(-1000px); opacity: 0; }
}

/* 🎁 Gifts */
.gift {
    position: fixed;
    bottom: 120px;
    cursor: pointer;
}
.gift1 { left: 20px; }
.gift2 { right: 20px; }

.box { width: 60px; height: 60px; position: relative; }
.base {
    width: 60px;
    height: 40px;
    background: #7b6aff;
    position: absolute;
    bottom: 0;
}
.lid {
    width: 60px;
    height: 20px;
    background: #4d2eff;
    position: absolute;
    top: 0;
    transform-origin: left bottom;
    transition: transform 0.5s;
}
.gift.open .lid { transform: rotate(-120deg); }

/* 🎉 Birthday Caps */
.cap {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-bottom: 40px solid;
    animation: floatUp linear infinite;
}

/* 🎊 Party Poppers */
.popper {
    position: fixed;
    width: 4px;
    height: 20px;
    background: gold;
    animation: pop 2s infinite;
}

@keyframes pop {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-300px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

    <img src=<img src="https://i.ibb.co/xxxxx/hari.jpg"> class="photo">

    <div class="content">
        <h1>Happy Birthday 🎂</h1>
        <div class="name">Dear HariPriya 💖</div>

        <button onclick="showWish()">Click Surprise 🎁</button>
        <p id="msg"></p>
    </div>

</div>

<!-- Gifts -->
<div class="gift gift1" onclick="openGiftBox(this)">
    <div class="box"><div class="lid"></div><div class="base"></div></div>
</div>
<div class="gift gift2" onclick="openGiftBox(this)">
    <div class="box"><div class="lid"></div><div class="base"></div></div>
</div>

<script>
// 🎈 Balloons
const colors=["#ff4d6d","#ffafcc","#cdb4db","#a0c4ff","#caffbf"];
for(let i=0;i<20;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
let c=colors[Math.floor(Math.random()*colors.length)];
b.style.background=c;
b.style.color=c;
b.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(b);
}

// 🎉 Caps
for(let i=0;i<10;i++){
let cap=document.createElement("div");
cap.className="cap";
cap.style.left=Math.random()*100+"%";
cap.style.borderBottomColor=colors[Math.floor(Math.random()*colors.length)];
cap.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(cap);
}

// 🎊 Poppers
for(let i=0;i<30;i++){
let p=document.createElement("div");
p.className="popper";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(1+Math.random()*2)+"s";
document.body.appendChild(p);
}

// 🎊 Confetti
const confColors=["#ffd166","#06d6a0","#118ab2","#cdb4db","#bde0fe"];
for(let i=0;i<50;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"%";
c.style.background=confColors[Math.floor(Math.random()*confColors.length)];
c.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(c);
}

// Message
function showWish(){
document.getElementById("msg").innerHTML=`
Happy Birthday to my lovely sister! 💕 You are my best friend forever.<br><br>
Wishing you lots of happiness, love, and success in life 🎉<br><br>
Happy Birthday akka! Stay happy always 😊 ❤️
`;
}

// Gift hearts
function openGiftBox(el){
el.classList.add("open");
const rect=el.getBoundingClientRect();
for(let i=0;i<20;i++){
setTimeout(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=(rect.left+rect.width/2)+"px";
h.style.top=(rect.top)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
},i*80);
}
setTimeout(()=>el.classList.remove("open"),800);
}
</script>

</body>
</html>
