<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Hari</title>

<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: 'Montserrat', sans-serif;
    background: #000000;
    overflow: hidden;
}

.container { position: relative; z-index: 2; }

h1 {
    font-family: 'Sacramento', cursive;
    font-size: 70px;
    color: #ffffff;
}

.name {
    font-size: 28px;
    color: #ffe066;
}

p {
    font-size: 18px;
    color: #f1f3f5;
}

button {
    padding: 12px 25px;
    background: linear-gradient(45deg, #ff2e63, #ff6a88);
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -150px;
    width: 60px;
    height: 80px;
    border-radius: 50% 50% 45% 45%;
    animation: float 8s linear infinite;
}

.balloon::after {
    content: "";
    position: absolute;
    width: 10px;
    height: 10px;
    background: inherit;
    bottom: -5px;
    left: 25px;
    transform: rotate(45deg);
}

.balloon::before {
    content: "";
    position: absolute;
    width: 2px;
    height: 50px;
    background: #ccc;
    bottom: -55px;
    left: 29px;
    border-radius: 50%;
    transform: rotate(10deg);
}

.balloon::after {
    content: "";
    position: absolute;
    width: 8px;
    height: 8px;
    background: inherit;
    bottom: -6px;
    left: 26px;
    transform: rotate(45deg);
}

@keyframes float {
    100% { transform: translateY(-120vh); }
}

/* Gifts */
.gift {
    position: fixed;
    bottom: 120px;
    font-size: 40px;
    cursor: pointer;
    animation: bounce 2s infinite;
}

.gift1 { left: 20px; }
.gift2 { right: 20px; }

@keyframes bounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

/* Hearts */
.heart {
    position: fixed;
    color: red; /* red hearts */
    animation: rise 3s linear forwards;
}

@keyframes rise {
    100% { transform: translateY(-200px); opacity: 0; }
}

/* Stars */
.star-glow {
    position: fixed;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    box-shadow: 0 0 10px #fff, 0 0 20px #00eaff;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* Shooting Stars */
.shooting-star {
    position: fixed;
    width: 2px;
    height: 80px;
    background: linear-gradient(-45deg, white, transparent);
    transform: rotate(45deg);
    animation: shoot 3s linear infinite;
}

@keyframes shoot {
    0% { transform: translate(0,0) rotate(45deg); opacity: 1; }
    100% { transform: translate(-600px,600px) rotate(45deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Birthday</h1>
    <div class="name">Dear HariPriya <br> Wish You a Very Happiest Birthday Hari</div>

    <button onclick="showWish()">Click for Surprise ❤</button>
    <p id="msg"></p>
</div>

<!-- Balloons -->
<div class="balloon" style="left:5%; background:#ff4d6d; animation-duration:6s;"></div>
<div class="balloon" style="left:10%; background:#ff6b6b; animation-duration:7s;"></div>
<div class="balloon" style="left:15%; background:#f06595; animation-duration:5.5s;"></div>
<div class="balloon" style="left:20%; background:#cc5de8; animation-duration:8s;"></div>
<div class="balloon" style="left:25%; background:#845ef7; animation-duration:6.5s;"></div>
<div class="balloon" style="left:30%; background:#5c7cfa; animation-duration:7.5s;"></div>
<div class="balloon" style="left:35%; background:#4dabf7; animation-duration:5s;"></div>
<div class="balloon" style="left:40%; background:#22b8cf; animation-duration:6s;"></div>
<div class="balloon" style="left:45%; background:#20c997; animation-duration:7s;"></div>
<div class="balloon" style="left:50%; background:#51cf66; animation-duration:6.5s;"></div>
<div class="balloon" style="left:55%; background:#94d82d; animation-duration:7.2s;"></div>
<div class="balloon" style="left:60%; background:#fcc419; animation-duration:6s;"></div>
<div class="balloon" style="left:65%; background:#ff922b; animation-duration:8s;"></div>
<div class="balloon" style="left:70%; background:#ff6b6b; animation-duration:5.8s;"></div>
<div class="balloon" style="left:75%; background:#ff8787; animation-duration:7.8s;"></div>
<div class="balloon" style="left:80%; background:#e64980; animation-duration:6.3s;"></div>
<div class="balloon" style="left:85%; background:#be4bdb; animation-duration:7.1s;"></div>
<div class="balloon" style="left:90%; background:#7950f2; animation-duration:6.7s;"></div>
<div class="balloon" style="left:95%; background:#4dabf7; animation-duration:8.2s;"></div>

<!-- Gifts -->
<div style="position:fixed; bottom:180px; left:20px; color:white; font-size:16px;">Click Gift</div>
<div style="position:fixed; bottom:180px; right:20px; color:white; font-size:16px;">Click Gift</div>
<div class="gift gift1" onclick="openGift(50)">🎁</div>
<div class="gift gift2" onclick="openGift(window.innerWidth-100)">🎁</div>

<!-- Stars -->
<div class="star-glow" style="top:10%; left:20%;"></div>
<div class="star-glow" style="top:30%; left:70%;"></div>
<div class="star-glow" style="top:60%; left:40%;"></div>

<!-- Shooting Stars -->
<div class="shooting-star" style="top:10%; left:80%;"></div>
<div class="shooting-star" style="top:40%; left:90%;"></div>

<script>
function showWish() {
    document.getElementById("msg").innerHTML = `
    You are not just my sister, you are my strength and my happiness.<br><br>
    Life is so beautiful because I have you as my sister.<br><br>
    No matter where life takes us, you will always be close to my heart.`;
}

function openGift(positionX) {
    for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.left = (positionX + Math.random()*50) + "px";
        heart.style.bottom = "60px";
        heart.style.fontSize = (20 + Math.random()*20) + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 3000);
    }
}
</script>

</body>
</html>
