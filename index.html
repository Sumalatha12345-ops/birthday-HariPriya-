<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Wishes</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(to right, #ffdde1, #ee9ca7);
    font-family: Arial;
    flex-direction: column;
}

h1 {
    color: white;
    font-size: 40px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #ff4d6d;
    color: white;
}
button:hover {
    background: #ff1e4d;
}
</style>
</head>

<body>

<h1>🎉 Happy Birthday 🎉</h1>

<button onclick="playMusic()">▶ Play Birthday Song</button>

<audio id="song">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

<script>
function playMusic() {
    let audio = document.getElementById("song");
    audio.play();
}
</script>

</body>
</html>
