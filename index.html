<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday 🎂</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
            text-align: center;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 50px;
            color: #ff4081;
        }

        h2 {
            font-size: 30px;
        }

        p {
            font-size: 20px;
        }

        .cake {
            font-size: 80px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #ff4081;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e73370;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="cake">🎂</div>
    <h1>Happy Birthday!</h1>
    <h2>Dear Anna 🎉</h2>
    <p>Wishing you lots of happiness, success, and love today and always 💖</p>

    <button onclick="showMessage()">Click for Surprise 🎁</button>

    <p id="msg"></p>
</div>

<script>
    function showMessage() {
        document.getElementById("msg").innerHTML = 
        "You are the best brother ever! 💙 Have an amazing year ahead!";
    }
</script>

</body>
</html>
