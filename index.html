<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Hari</title>

<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-family: 'Montserrat', sans-serif;

    /* 🎂 REAL BIRTHDAY BACKGROUND IMAGE */
    background: url('https://images.unsplash.com/photo-1530103862676-de8c9debad1d') no-repeat center center/cover;

    overflow: hidden;
}

/* Dark overlay for readability */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
    left: 0;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 2;
}

h1 {
    font-family: 'Sacramento', cursive;
    font-size: 70px;
    color: white;
    text-shadow: 0 0 20px #fff;
}

.name {
    font-size: 28px;
    color: #ffe066;
}

p {
    font-size: 18px;
    color: #ffffff;
}

button {
    padding: 12px 25px;
    margin-top: 20px;
    background: linear-gradient(45deg,#ff2e63,#ff6a88);
    color: white;
    border: none;
    border-radius: 25px;
    cursor: pointer;
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -150px;
    width: 60px;
    height: 80px;
    border-radius: 50% 50% 45% 45%;
    animation: float linear infinite;
    box-shadow: inset -5px -10px 15px rgba(0,0,0,0.2),
                inset 5px 5px 15px rgba(255,255,255,0.3);
}

.balloon::after {
    content: "";
    position: absolute;
    top: 10px;
    left: 15px;
    width: 20px;
    height: 30px;
    background: rgba(255,255,255,0.4);
    border-radius: 50%;
}

.balloon::before {
    content: "";
    position: absolute;
    width: 2px;
    height: 50px;
    background: currentColor;
    bottom: -55px;
    left: 29px;
    animation: ribbonWave 2s infinite alternate;
}

@keyframes ribbonWave {
    from { transform: rotate(5deg); }
    to { transform: rotate(15deg); }
}

@keyframes float {
    100% { transform: translateY(-120vh); }
}

/* Gift */
.gift {
    position: fixed;
    bottom: 120px;
    cursor: pointer;
    animation: bounce 2s infinite;
}

.gift1 { left: 20px; }
.gift2 { right: 20px; }

.box { width: 60px; height: 60px; position: relative; }

.base {
    width: 60px;
    height: 40px;
    background: #ff6a88;
    position: absolute;
    bottom: 0;
    border-radius: 5px;
}

.lid {
    width: 60px;
    height: 20px;
    background: #ff2e63;
    position: absolute;
    top: 0;
    border-radius: 5px;
    transform-origin: left bottom;
    transition: transform 0.5s ease;
}

.gift.open .lid {
    transform: rotate(-120deg);
}

/* Hearts */
.heart {
    position: fixed;
    color: red;
    animation: rise 3s linear forwards;
}

@keyframes rise {
    100% {
        transform: translateY(-200px);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Birthday</h1>
    <div class="name">Dear HariPriya <br> Wish You a Very Happiest Birthday Hari</div>

    <button onclick="showWish()">Click Surprise for You ❤</button>
    <p id="msg"></p>
</div>

<!-- 🎈 Balloons -->
<script>
const colors = ["#ffd6e0","#caffbf","#a0c4ff","#ffc6ff","#fdffb6","#ffadad","#cdb4db","#bde0fe"];

for(let i=0;i<30;i++){
    let b = document.createElement("div");
    b.className="balloon";
    b.style.left = Math.random()*100 + "%";
    let c = colors[Math.floor(Math.random()*colors.length)];
    b.style.background = c;
    b.style.color = c;
    b.style.animationDuration = (5+Math.random()*5)+"s";
    document.body.appendChild(b);
}
</script>

<!-- Gifts -->
<div class="gift gift1" onclick="openGiftBox(this)">
    <div class="box"><div class="lid"></div><div class="base"></div></div>
</div>

<div class="gift gift2" onclick="openGiftBox(this)">
    <div class="box"><div class="lid"></div><div class="base"></div></div>
</div>

<script>
function showWish() {
    document.getElementById("msg").innerHTML = `
    You are not just my sister, you are my strength and my happiness.<br><br>
    Life is so beautiful because I have you as my sister.<br><br>
    No matter where life takes us, you will always be close to my heart.`;
}

function openGiftBox(el) {
    el.classList.add("open");

    const rect = el.getBoundingClientRect();

    for (let i = 0; i < 20; i++) {
        setTimeout(() => {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤";

            heart.style.left = (rect.left + rect.width/2) + "px";
            heart.style.top = (rect.top + 20) + "px";

            let x = Math.random()*100 - 50;
            heart.style.transform = `translateX(${x}px)`;
            heart.style.fontSize = (18 + Math.random()*20) + "px";

            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);

        }, i * 80);
    }

    setTimeout(() => el.classList.remove("open"), 800);
}
</script>

</body>
</html>
